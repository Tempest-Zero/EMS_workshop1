# Alembic config. The DB URL is intentionally a placeholder — `alembic/env.py`
# overrides it with `app.core.config.settings.database_url` at runtime so we
# never have the URL in two places.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = driver://placeholder-overridden-by-env-py


[post_write_hooks]
# Auto-format generated migrations with ruff so they pass CI on the first try.
hooks = ruff_format, ruff_fix
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_fix.type = console_scripts
ruff_fix.entrypoint = ruff
ruff_fix.options = check --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
