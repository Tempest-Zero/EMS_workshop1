# Dependency updates (ROADMAP Track D4). Three runtimes + the CI workflow.
# Minor/patch bumps are grouped into one PR per ecosystem to keep the noise
# down; majors come as their own PRs (they tend to need a human anyway).
version: 2
updates:
  # ── Web manager app (npm, repo root) ──────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, web]
    groups:
      web-minor-and-patch:
        update-types: [minor, patch]

  # ── Technician mobile app (npm) ───────────────────────────────────────────
  # The Expo SDK pins exact compatible versions of its native modules
  # (expo/bundledNativeModules.json) — they MUST be bumped via `expo install`
  # during a deliberate SDK upgrade, never independently. Dependabot once bumped
  # expo-asset/crypto/location to a far-future SDK's versions (~56.x on SDK 52);
  # it passed CI (the mobile job runs `expo export`, a JS bundle, not a native
  # build) and only broke at the EAS gradle build. So the whole Expo/RN native
  # family is ignored here — let `expo install`/SDK upgrades own those versions.
  - package-ecosystem: npm
    directory: /technician-app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, mobile]
    ignore:
      - dependency-name: expo
      - dependency-name: expo-*
      - dependency-name: "@expo/*"
      - dependency-name: react
      - dependency-name: react-dom
      - dependency-name: react-native
      - dependency-name: react-native-*
      - dependency-name: "@react-native/*"
      - dependency-name: "@react-native-community/*"
      - dependency-name: "@sentry/react-native"
    groups:
      mobile-minor-and-patch:
        update-types: [minor, patch]

  # ── Backend (pip / pyproject.toml) ────────────────────────────────────────
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    groups:
      backend-minor-and-patch:
        update-types: [minor, patch]

  # ── GitHub Actions (the CI workflow pins) ─────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
    groups:
      actions:
        update-types: [minor, patch]
