name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend (web manager) ────────────────────────────────────────────────
  # Job name kept identical to the original so existing branch-protection
  # rules referencing this check keep matching after the backend job is added.
  frontend:
    name: Lint · Format · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  # ── Mobile (Expo technician app) ──────────────────────────────────────────
  mobile:
    name: Mobile · TypeScript · Jest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: technician-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: technician-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: Jest
        run: npm test -- --ci --passWithNoTests

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    name: Backend · Ruff · Mypy · Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy app

      - name: Pytest
        run: pytest
