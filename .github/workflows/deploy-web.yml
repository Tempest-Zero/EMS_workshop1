name: Deploy web (GitHub Pages)

# Publishes the manager web (Vite SPA) to GitHub Pages. The app is served under
# the project subpath, so the build sets VITE_BASE; VITE_API_URL points at the
# live Railway backend. Enable once in repo Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "index.html"
      - "vite.config.js"
      - "package.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /EMS_workshop1/
          VITE_API_URL: https://efficient-tenderness-production-2d09.up.railway.app
      - name: SPA fallback (Pages serves 404.html for deep links)
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
